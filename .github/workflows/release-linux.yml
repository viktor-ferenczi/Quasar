name: release-linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install packaging dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo add-apt-repository multiverse
          sudo apt-get update
          echo steam steam/question select "I AGREE" | sudo debconf-set-selections
          echo steam steam/license note "" | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y p7zip-full steamcmd

      - name: Install Space Engineers Dedicated Server references
        run: |
          mkdir -p "$HOME/.steam/steam/steamapps/common/SpaceEngineersDedicatedServer"
          /usr/games/steamcmd \
            +force_install_dir "$HOME/.steam/steam/steamapps/common/SpaceEngineersDedicatedServer" \
            +login anonymous \
            +app_update 298740 validate \
            +quit

      - name: Resolve Quasar release metadata
        id: release
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            ui_tag="quasar-ui/v${version}"
            bootstrap_tag="v${version}"
            ui_name="Quasar UI v${version}"
            bootstrap_name="Quasar v${version}"
            draft="false"
            prerelease="false"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            version="0.1.0-main.${GITHUB_RUN_NUMBER}"
            ui_tag="quasar-ui/v${version}"
            bootstrap_tag="v${version}"
            ui_name="Quasar UI main ${GITHUB_SHA::7}"
            bootstrap_name="Quasar main ${GITHUB_SHA::7}"
            draft="true"
            prerelease="true"
          else
            version="$(git rev-parse --short HEAD)"
            ui_tag="quasar-ui/$version"
            bootstrap_tag="$version"
            ui_name="Quasar UI $version"
            bootstrap_name="Quasar $version"
            draft="true"
            prerelease="true"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ui_tag=$ui_tag" >> "$GITHUB_OUTPUT"
          echo "bootstrap_tag=$bootstrap_tag" >> "$GITHUB_OUTPUT"
          echo "ui_name=$ui_name" >> "$GITHUB_OUTPUT"
          echo "bootstrap_name=$bootstrap_name" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Install Magnetar PluginSdk reference
        run: |
          mkdir -p "$HOME/.local/share/Magnetar"
          MAGNETAR_URL="$(python3 - <<'PY'
          import fnmatch
          import json
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/viktor-ferenczi/Magnetar/releases/latest",
              headers={"User-Agent": "Quasar"},
          )
          with urllib.request.urlopen(req) as response:
              release = json.load(response)
          if release.get("draft") or release.get("prerelease"):
              raise SystemExit("latest Magnetar release is not a full release")
          matches = [
              asset for asset in release.get("assets", [])
              if fnmatch.fnmatchcase(asset.get("name", ""), "MagnetarForLinux-*.7z")
          ]
          if len(matches) != 1:
              names = ", ".join(asset.get("name", "") for asset in release.get("assets", []))
              raise SystemExit(f"expected one MagnetarForLinux-*.7z asset, found {len(matches)}: {names}")
          print(matches[0]["browser_download_url"])
          PY
          )"
          curl -fL "$MAGNETAR_URL" -o /tmp/magnetar.7z
          7z x /tmp/magnetar.7z "-o$HOME/.local/share/Magnetar" -y
          PLUGIN_SDK="$(find "$HOME/.local/share/Magnetar" -path "*/Bin/PluginSdk.dll" -print -quit)"
          if [ -z "$PLUGIN_SDK" ]; then
            echo "PluginSdk.dll not found in Magnetar archive" >&2
            exit 1
          fi
          echo "MagnetarBin=$(dirname "$PLUGIN_SDK")" >> "$GITHUB_ENV"

      - name: Package Linux release
        run: scripts/package-linux-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quasar-linux
          path: |
            artifacts/linux/quasar-web-linux-x64.tar.gz
            artifacts/linux/quasar-linux-x64.tar.gz
            artifacts/linux/SHA256SUMS

      - name: Attach UI artifact to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.ui_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.ui_name }}
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          files: |
            artifacts/linux/quasar-web-linux-x64.tar.gz
            artifacts/linux/SHA256SUMS

      - name: Attach Bootstrap artifact to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.bootstrap_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.bootstrap_name }}
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          files: |
            artifacts/linux/quasar-linux-x64.tar.gz
            artifacts/linux/SHA256SUMS
