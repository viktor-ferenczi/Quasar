name: release-linux

on:
  workflow_dispatch:
    inputs:
      component:
        description: Release stream to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - ui
          - bootstrap
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-linux.yml"
      - "Directory.Build.props"
      - "Magnetar.Protocol/**"
      - "Quasar/**"
      - "Quasar.Agent/**"
      - "Quasar.Bootstrap/**"
      - "Quasar.sln"
      - "install.sh"
      - "scripts/package-linux-release.sh"
      - "uninstall.sh"
    tags:
      - "v*"

permissions:
  contents: write

env:
  SE_DS_APPID: "298740"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install packaging dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo add-apt-repository multiverse
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl lib32gcc-s1 p7zip-full

      - name: Probe Dedicated Server build id
        id: dsbuild
        run: |
          set -euo pipefail
          mkdir -p steamcmd
          curl -fsSL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
            | tar -xz -C steamcmd

          buildid=""
          for attempt in 1 2 3 4 5; do
            out="$(./steamcmd/steamcmd.sh +login anonymous +app_info_update 1 \
                     +app_info_print "$SE_DS_APPID" +quit 2>/dev/null || true)"
            buildid="$(printf '%s' "$out" | tr -d '\r' | awk '
              /"branches"/              { in_branches = 1 }
              in_branches && /"public"/ { in_public = 1 }
              in_public && /"buildid"/  { gsub(/[^0-9]/, "", $2); print $2; exit }
            ')"
            [ -n "$buildid" ] && break
            echo "Dedicated Server build id probe attempt $attempt empty; retrying..."
            sleep 5
          done

          if [ -z "$buildid" ]; then
            echo "WARNING: could not determine DS build id; DS cache will miss this run." >&2
            buildid="norev-${{ github.run_id }}"
          fi
          echo "Dedicated Server public build id: $buildid"
          echo "buildid=$buildid" >> "$GITHUB_OUTPUT"

      - name: Cache Dedicated Server libraries
        id: dscache
        uses: actions/cache@v4
        with:
          path: ds64
          key: ds64-linux-${{ steps.dsbuild.outputs.buildid }}

      - name: Install Space Engineers Dedicated Server references
        if: steps.dscache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p dsfull

          ./steamcmd/steamcmd.sh +quit || true

          ok=0
          for attempt in 1 2 3 4 5; do
            echo "SteamCMD install attempt $attempt/5"
            ./steamcmd/steamcmd.sh \
              +@sSteamCmdForcePlatformType windows \
              +force_install_dir "$PWD/dsfull" \
              +login anonymous \
              +app_update "$SE_DS_APPID" validate \
              +quit || true
            if [ -f "$PWD/dsfull/DedicatedServer64/SpaceEngineersDedicated.exe" ]; then
              ok=1
              break
            fi
            echo "SteamCMD attempt $attempt did not complete the DS install; retrying..."
            sleep 5
          done
          if [ "$ok" != 1 ]; then
            echo "ERROR: SteamCMD failed to install Space Engineers Dedicated Server references." >&2
            exit 1
          fi

          mkdir -p ds64
          cp -a "$PWD/dsfull/DedicatedServer64/." ds64/
          rm -rf dsfull
          echo "Cached DS library set:"; du -sh ds64

      - name: Resolve Quasar release metadata
        id: release
        env:
          DISPATCH_COMPONENT: ${{ github.event.inputs.component || 'all' }}
        run: |
          publish_ui="false"
          publish_bootstrap="false"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            ui_tag="quasar-ui/v${version}"
            bootstrap_tag="v${version}"
            ui_name="Quasar UI v${version}"
            bootstrap_name="Quasar v${version}"
            draft="false"
            prerelease="false"
            publish_ui="true"
            publish_bootstrap="true"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="0.1.0-manual.${GITHUB_RUN_NUMBER}"
            ui_tag="quasar-ui/v${version}"
            bootstrap_tag="v${version}"
            ui_name="Quasar UI manual ${GITHUB_SHA::7}"
            bootstrap_name="Quasar manual ${GITHUB_SHA::7}"
            draft="true"
            prerelease="true"
            case "$DISPATCH_COMPONENT" in
              all)
                publish_ui="true"
                publish_bootstrap="true"
                ;;
              ui)
                publish_ui="true"
                ;;
              bootstrap)
                publish_bootstrap="true"
                ;;
              *)
                echo "Unknown component: $DISPATCH_COMPONENT" >&2
                exit 1
                ;;
            esac
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            version="0.1.0-main.${GITHUB_RUN_NUMBER}"
            ui_tag="quasar-ui/v${version}"
            bootstrap_tag="v${version}"
            ui_name="Quasar UI main ${GITHUB_SHA::7}"
            bootstrap_name="Quasar main ${GITHUB_SHA::7}"
            draft="true"
            prerelease="true"
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")"
            else
              changed_files="$(git diff --name-only "$base" "$GITHUB_SHA")"
            fi
            while IFS= read -r path; do
              case "$path" in
                .github/workflows/release-linux.yml|Directory.Build.props|Magnetar.Protocol/*|Quasar.sln|scripts/package-linux-release.sh)
                  publish_ui="true"
                  publish_bootstrap="true"
                  ;;
                Quasar.Bootstrap/*|install.sh|uninstall.sh)
                  publish_bootstrap="true"
                  ;;
                Quasar/appsettings.json)
                  publish_ui="true"
                  publish_bootstrap="true"
                  ;;
                Quasar/*|Quasar.Agent/*)
                  publish_ui="true"
                  ;;
              esac
            done <<< "$changed_files"
          else
            version="$(git rev-parse --short HEAD)"
            ui_tag="quasar-ui/$version"
            bootstrap_tag="$version"
            ui_name="Quasar UI $version"
            bootstrap_name="Quasar $version"
            draft="true"
            prerelease="true"
            publish_ui="true"
            publish_bootstrap="true"
          fi
          if [[ "$publish_ui" != "true" && "$publish_bootstrap" != "true" ]]; then
            echo "No release stream selected for this change set." >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ui_tag=$ui_tag" >> "$GITHUB_OUTPUT"
          echo "bootstrap_tag=$bootstrap_tag" >> "$GITHUB_OUTPUT"
          echo "ui_name=$ui_name" >> "$GITHUB_OUTPUT"
          echo "bootstrap_name=$bootstrap_name" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "publish_ui=$publish_ui" >> "$GITHUB_OUTPUT"
          echo "publish_bootstrap=$publish_bootstrap" >> "$GITHUB_OUTPUT"
          echo "Release streams: ui=$publish_ui bootstrap=$publish_bootstrap"

      - name: Install Magnetar PluginSdk reference
        run: |
          mkdir -p "$HOME/.local/share/Magnetar"
          MAGNETAR_URL="$(python3 - <<'PY'
          import fnmatch
          import json
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/viktor-ferenczi/Magnetar/releases/latest",
              headers={"User-Agent": "Quasar"},
          )
          with urllib.request.urlopen(req) as response:
              release = json.load(response)
          if release.get("draft") or release.get("prerelease"):
              raise SystemExit("latest Magnetar release is not a full release")
          matches = [
              asset for asset in release.get("assets", [])
              if fnmatch.fnmatchcase(asset.get("name", ""), "MagnetarForLinux-*.7z")
          ]
          if len(matches) != 1:
              names = ", ".join(asset.get("name", "") for asset in release.get("assets", []))
              raise SystemExit(f"expected one MagnetarForLinux-*.7z asset, found {len(matches)}: {names}")
          print(matches[0]["browser_download_url"])
          PY
          )"
          curl -fL "$MAGNETAR_URL" -o /tmp/magnetar.7z
          7z x /tmp/magnetar.7z "-o$HOME/.local/share/Magnetar" -y
          PLUGIN_SDK="$(find "$HOME/.local/share/Magnetar" -path "*/Bin/PluginSdk.dll" -print -quit)"
          if [ -z "$PLUGIN_SDK" ]; then
            echo "PluginSdk.dll not found in Magnetar archive" >&2
            exit 1
          fi
          echo "MagnetarBin=$(dirname "$PLUGIN_SDK")" >> "$GITHUB_ENV"

      - name: Package Linux release
        env:
          DS64: ${{ github.workspace }}/ds64
        run: scripts/package-linux-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quasar-linux
          path: |
            artifacts/linux/quasar-web-linux-x64.tar.gz
            artifacts/linux/quasar-linux-x64.tar.gz
            artifacts/linux/SHA256SUMS

      - name: Attach UI artifact to GitHub release
        if: steps.release.outputs.publish_ui == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.ui_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.ui_name }}
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          files: |
            artifacts/linux/quasar-web-linux-x64.tar.gz
            artifacts/linux/SHA256SUMS

      - name: Attach Bootstrap artifact to GitHub release
        if: steps.release.outputs.publish_bootstrap == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.bootstrap_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.bootstrap_name }}
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          files: |
            artifacts/linux/quasar-linux-x64.tar.gz
            artifacts/linux/SHA256SUMS
